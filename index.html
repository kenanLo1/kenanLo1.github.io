<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Çevrimdışı | KenanLo Gaming</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; align-items: center; justify-content: center; margin: 0; overflow: hidden; text-align: center; }
        .container { border: 2px solid #00ff66; padding: 40px; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px #00ff66, inset 0 0 15px rgba(0,255,102,0.3); border-radius: 8px; max-width: 500px; position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: 0 0 40px #ff0055; opacity: 0.5; z-index: -1; pointer-events: none; }
        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 3px; color: #ff0055; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; margin-bottom: 20px; }
        p { font-size: 1.2rem; color: #00ff66; text-shadow: 0 0 5px #00ff66; line-height: 1.6; }
        .timer { margin-top: 25px; font-weight: bold; font-size: 1.5rem; color: #00e5ff; text-shadow: 0 0 8px #00e5ff; border: 1px dashed #00e5ff; padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SİSTEM HAZIRLANIYOR</h1>
        <p>İnternet sitesinin açılmasına son 10 dakika!<br>Büyük açılış için yerlerinizi alın.</p>
        <div class="timer" id="countdown">10:00</div>
    </div>
    <script>
        const target = new Date().getTime() + (10 * 60 * 1000);
        setInterval(() => {
            const diff = target - new Date().getTime();
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            const pad = (num) => String(num).padStart(2, '0');
            document.getElementById("countdown").innerHTML = diff > 0 ? `${pad(m)}DİK ${pad(s)}SAN KALDI` : "SİTE AKTİF!";
        }, 1000);
    </script>
</body>
</html>
